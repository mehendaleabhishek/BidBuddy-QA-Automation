# Fast smoke suite — runs on every push and pull request.
name: CI (Smoke)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      HEADLESS: true
      SLOW_MO_MS: 0
      BASE_URL: https://dev.bidbuddy.com
      DEFAULT_TIMEOUT_MS: 30000
      PM_EMAIL: ${{ secrets.PM_EMAIL }}
      PM_PASSWORD: ${{ secrets.PM_PASSWORD }}
      VENDOR_EMAIL: ${{ secrets.VENDOR_EMAIL }}
      VENDOR_PASSWORD: ${{ secrets.VENDOR_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Apply optional repository variables
        run: |
          if [ -n "${{ vars.BASE_URL }}" ]; then
            echo "BASE_URL=${{ vars.BASE_URL }}" >> "$GITHUB_ENV"
          fi

      - name: Validate PM credentials
        run: |
          if [ -z "$PM_EMAIL" ] || [ -z "$PM_PASSWORD" ]; then
            echo "::error::Repository secrets PM_EMAIL and PM_PASSWORD are required."
            echo "Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Run smoke tests
        run: pytest -m smoke -v --tb=short

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore
