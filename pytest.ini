[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -ra
markers =
    smoke: Quick checks for critical paths (login, navigation)
    regression: Full user-flow coverage
    property_manager: Tests scoped to PM role
    vendor: Tests scoped to Vendor role
    create_property: Create New Property modal test cases
    properties_list: Properties list page test cases
